services:
  # --- Backend (FastAPI) ---
  - type: web
    name: educationia-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"

  # --- Frontend (Next.js) ---
  - type: web
    name: educationia-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20.11.1"
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: educationia-backend
          type: web
          property: host
