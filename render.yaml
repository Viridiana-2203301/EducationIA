services:
  # --- Backend (FastAPI) ---
  - type: web
    name: educationia-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120 --timeout-graceful-shutdown 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
